apiVersion: v1
kind: Pod
metadata:
  labels:
    app: app
  name: logoscore-requester
  namespace: ns
spec:
  automountServiceAccountToken: true
  containers:
    - command:
        - sh
        - -c
        - |
          python /app/api_requester.py --mode=server --config=/mount/config.yaml
      image: repo:tag
      imagePullPolicy: Always
      name: pod-api-requester-container
      ports:
        - containerPort: 8645
        - containerPort: 8008
        - containerPort: 8080
      resources:
        limits:
          memory: 4Gi
          cpu: 2000m
        requests:
          memory: 1Gi
          cpu: 500m
      volumeMounts:
        - mountPath: /mount
          name: api-requester-config-volume
  dnsConfig:
    searches:
      - service-name.ns.svc.cluster.local
  securityContext:
    fsGroup: 0
    runAsUser: 0
  serviceAccountName: service-account-name
  volumes:
    - configMap:
        name: api-requester-config
      name: api-requester-config-volume
