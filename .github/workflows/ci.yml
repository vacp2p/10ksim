name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  lint:
    name: Lint (autoflake, isort, black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - run: uv sync --frozen

      - name: Check unused imports (autoflake)
        run: uv run autoflake --remove-all-unused-imports --recursive --check .

      - name: Check import order (isort)
        run: uv run isort --profile black -l 100 --check-only --diff .

      - name: Check formatting (black)
        run: uv run black -l 100 --check --diff .

  test:
    name: Tests
    runs-on: ubuntu-latest
    # Most tests have stale imports (pre-existing). Non-blocking until fixed.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - run: uv sync --frozen

      - name: Run unit tests
        run: uv run python -m unittest discover -s src -p "test_*.py" -v
