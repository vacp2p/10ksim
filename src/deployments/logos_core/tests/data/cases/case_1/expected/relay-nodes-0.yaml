apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: relay-nodes-0
  namespace: ns
spec:
  replicas: 100
  selector:
    matchLabels:
      app: zerotenkay-core
  serviceName: core-relay
  template:
    metadata:
      labels:
        app: zerotenkay-core
      name: relay-nodes-0
      namespace: ns
    spec:
      containers:
        - env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
          image: pearsonwhite/dst-lc-node:wip3-amd
          imagePullPolicy: IfNotPresent
          name: logoscore-0
          ports:
            - containerPort: 8645
            - containerPort: 8008
            - containerPort: 8080
          resources:
            limits:
              memory: 4Gi
              cpu: 2000m
            requests:
              memory: 1Gi
              cpu: 500m
      dnsConfig:
        searches:
          - core-relay.ns.svc.cluster.local
          - core-bootstrap.ns.svc.cluster.local
      serviceAccountName: secret-creator2
