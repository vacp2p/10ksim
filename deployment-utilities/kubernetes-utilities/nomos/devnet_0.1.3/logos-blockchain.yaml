apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dst-node
  namespace: nomos-testnet
spec:
  replicas: 1
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  selector:
    matchLabels:
      app: nomos
  template:
    metadata:
      labels:
        app: nomos
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: nomos
      containers:
        - name: nomos
          image: soutullostatus/logos-blockchain:0.1.3-rc.6
          imagePullPolicy: Always
          resources:
            requests:
              memory: "1024Mi"
              cpu: "1000m"
            limits:
              memory: "4096Mi"
              cpu: "2000m"
          env:
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          volumeMounts:
            - name: nomos-data
              mountPath: /state
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  curl -fsS http://localhost:8080/cryptarchia/info | grep -q '"mode":{"Started":"Online"}'
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo
              ORD="${HOSTNAME##*-}"
              BASE=31000
              SWARM=$((BASE + 2*ORD))
              BLEND=$((SWARM + 1))

              if [ ! -f /state/user_config.yaml ]; then
                echo "user_config.yaml not found, initializing node"
          
                logos-blockchain-node init \
                  --net-port "${SWARM}" \
                  --blend-port "${BLEND}" \
                  --external-address "/ip4/${HOST_IP}/udp/${SWARM}/quic-v1" \
                    -p /ip4/65.108.203.235/udp/3000/quic-v1/p2p/12D3KooWNAqHT61rDjVrJhJc6BHpsS6uu5rr4ZGE8KgNs2WKS8xF \
                    -p /ip4/65.108.203.235/udp/3001/quic-v1/p2p/12D3KooWEKER7WpfNLKQvcG3cZFvPhV7T2Y1LMPs5GjSbE9rz7Vp \
                    -p /ip4/65.108.203.235/udp/3002/quic-v1/p2p/12D3KooWJpVWq8NhddLvvTR32NKhRYnkZApMnaujm3DHEdih2o3W \
                    -p /ip4/65.108.203.235/udp/3003/quic-v1/p2p/12D3KooWCBAh6dDYW5nM3puSnwDCX2S3mp7LKoeEYu9vXLeusvxP
          
                sed -i "/^  metrics: None$/c\\
                metrics: !Otlp\\
                  endpoint: \"http://otlp.lab.vac.dev:31317/\"\\
                  host_identifier: \"${HOSTNAME}\"\\
                  authorization_header: \"<bearer token>"" user_config.yaml
          
                sed -i '/^[[:space:]]*file:[[:space:]]*$/{
                  N
                  N
                  s|^[[:space:]]*file:[[:space:]]*$\n[[:space:]]*directory: .*$\n[[:space:]]*prefix: .*$|file: null|
                }' user_config.yaml
          
                cp user_config.yaml /state/user_config.yaml
                cp kms.yaml /state/kms.yaml
              else
                echo "Using existing /state/user_config.yaml"
              fi

              exec logos-blockchain-node /state/user_config.yaml
        - name: blend-declaration
          image: soutullostatus/logos-blockchain-tools:0.1.3-rc.6
          imagePullPolicy: Always
          env:
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          volumeMounts:
            - name: nomos-data
              mountPath: /state
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo
          
              ORD="${HOSTNAME##*-}"
              BASE=31000
              SWARM=$((BASE + 2*ORD))
              BLEND=$((SWARM + 1))
          
              USER_CONFIG=/state/user_config.yaml
              MARKER=/state/.blend-declaration-done
              
              sleep 10
              
              while ! curl -fsS http://localhost:8080/cryptarchia/info | grep -q '"mode":{"Started":"Online"}'; do
                sleep 5
              done
          
              if [ -f "$MARKER" ]; then
                echo "Blend declaration already done, skipping"
                tail -f /dev/null
              fi
          
              KMS_ID="$(
                awk '
                  /^[[:space:]]*secret_key_kms_id:[[:space:]]*/ {
                    key=$2
                    print key
                    exit
                  }
                ' "$USER_CONFIG"
              )"
              echo "Using KMS key: $KMS_ID"
              FAUCET_RESPONSE="$(
                curl -fsS -X POST "https://devnet.blockchain.logos.co/web/faucet-backend/${KMS_ID}"
              )"
              echo "Faucet request accepted"
              
              FUNDING_PK="$(
                awk '
                  /^[[:space:]]*sdp:/ { in_sdp=1; next }
                  in_sdp && /^[[:space:]]*wallet:/ { in_wallet=1; next }
                  in_wallet && /^[[:space:]]*funding_pk:[[:space:]]*/ {
                    print $2
                    exit
                  }
                ' "$USER_CONFIG"
              )"
              echo "Using funding_pk key: $FUNDING_PK"
              FAUCET_RESPONSE="$(
                curl -fsS -X POST "https://devnet.blockchain.logos.co/web/faucet-backend/${FUNDING_PK}"
              )"
              echo "Faucet request accepted"
              
              echo "Waiting 300s for wallet balance to update..."
              sleep 300
              
              BALANCE_RESPONSE="$(
                curl -fsS "http://localhost:8080/wallet/${KMS_ID}/balance"
              )"
              
              NOTE_ID_HEX="$(
                echo "$BALANCE_RESPONSE" \
                  | jq -r '.notes | keys[0] // empty'
              )"
              
              if [ -z "$NOTE_ID_HEX" ]; then
                echo "Could not find NOTE_ID_HEX in wallet balance"
                echo "Balance response: $BALANCE_RESPONSE"
                exit 1
              fi
              
              echo "Using NOTE_ID_HEX: $NOTE_ID_HEX"
              
              logos-blockchain-tools-api \
                sdp post-blend-declaration \
                --user-config-path "$USER_CONFIG" \
                --blend-addr "/ip4/${HOST_IP}/udp/${BLEND}/quic-v1" \
                --locked-note-id "$NOTE_ID_HEX" \
                --node-address "http://localhost:8080"
          
              touch "$MARKER"
          
              tail -f /dev/null
  volumeClaimTemplates:
    - metadata:
        name: nomos-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn-nomos
        resources:
          requests:
            storage: 20Gi
