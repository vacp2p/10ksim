apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pod
  namespace: {{ default "zerotesting-nimlibp2p" .Values.nimlibp2p.nodes.namespace }}
spec:
  {{ $isMixNode := eq .Values.nimlibp2p.nodes.env.type "mix" }}
  replicas: {{ .Values.nimlibp2p.nodes.numNodes }}
  podManagementPolicy: "Parallel"
  serviceName: nimp2p-service
  selector:
    matchLabels:
      app: {{ default "zerotenkay" .Values.nimlibp2p.nodes.app }}
  template:
    metadata:
      labels:
        app: {{ default "zerotenkay" .Values.nimlibp2p.nodes.app }}
    spec:
      dnsConfig:
        {{- toYaml .Values.nimlibp2p.nodes.dnsConfig | nindent 8 }}

      {{ if gt (int .Values.nimlibp2p.nodes.network.delay) 0 -}}
      initContainers:
        - name: slowyourroll
          image: soutullostatus/tc-container:1
          securityContext:
            capabilities:
              add: [ "NET_ADMIN" ]
          command:
            - sh
            - -c
            {{ if gt (int .Values.nimlibp2p.nodes.network.jitter) 0 -}}
            - "tc qdisc add dev eth0 root netem delay {{ .Values.nimlibp2p.nodes.network.delay }}ms {{ .Values.nimlibp2p.nodes.network.jitter }}ms distribution normal"
            {{ else }}
            - "tc qdisc add dev eth0 root netem delay {{ .Values.nimlibp2p.nodes.network.delay }}ms"
            {{- end }}
      {{- end }}
      containers:
        - name: container-0
          image: {{ default "soutullostatus/dst-test-node" .Values.nimlibp2p.nodes.image.repository }}:{{ default "v1.8.0-mplex" .Values.nimlibp2p.nodes.image.tag }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
            - containerPort: 8008
          resources:
            requests:
              memory: "64Mi"
              cpu: "150m"
            limits:
              memory: "600Mi"
              cpu: "400m"
          env:
            {{- $envArgs := .Values.nimlibp2p.nodes.env }}
            {{- $preset := $envArgs.type | default "basic" -}}
            {{- include "env.genVars" ( dict
              "args" $envArgs.vars
              "presets" $envArgs.presets
              "preset" $preset)  | nindent 16 }}
          args:
            - {{ quote .Values.nimlibp2p.nodes.minutes }}
            - {{ quote .Values.nimlibp2p.nodes.hours }}
          {{ if $isMixNode -}}
          volumeMounts:
            - name: pubkeys
              mountPath: /data
          {{- end }}
      {{ if $isMixNode -}}
      volumes:
        - name: pubkeys
          persistentVolumeClaim:
            claimName: pubkeys-pvc
      {{- end }}