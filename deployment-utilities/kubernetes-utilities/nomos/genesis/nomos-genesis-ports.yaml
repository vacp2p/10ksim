apiVersion: v1
kind: Service
metadata:
  name: node-genesis-0
  namespace: nomos-genesis
spec:
  type: ClusterIP
  selector:
    statefulset.kubernetes.io/pod-name: nomos-genesis-0
  ports:
    - name: swarm
      protocol: UDP
      port: 7000
      targetPort: 7000
    - name: blend
      protocol: UDP
      port: 7001
      targetPort: 7001
