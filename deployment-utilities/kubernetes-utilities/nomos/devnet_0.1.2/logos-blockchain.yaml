apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nomos
  namespace: nomos-testnet
spec:
  replicas: 1
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  selector:
    matchLabels:
      app: nomos
  template:
    metadata:
      labels:
        app: nomos
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: nomos
      containers:
        - name: nomos
          image: soutullostatus/logos-blockchain:0.1.2
          imagePullPolicy: Always
          resources:
            requests:
              memory: "1024Mi"
              cpu: "1000m"
            limits:
              memory: "4096Mi"
              cpu: "2000m"
          env:
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          volumeMounts:
            - name: nomos-data
              mountPath: /state
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  curl -fsS http://localhost:8080/cryptarchia/info | grep -q '"mode":"Online"'
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo
              ORD="${HOSTNAME##*-}"
              BASE=31000
              SWARM=$((BASE + 2*ORD))
              BLEND=$((SWARM + 1))
              
              logos-blockchain-node init \
                --net-port "${SWARM}" \
                --blend-port "${BLEND}" \
                --external-address "/ip4/${HOST_IP}/udp/${SWARM}/quic-v1" \
                  -p /ip4/65.109.51.37/udp/3000/quic-v1/p2p/12D3KooWFrouXfmrR4nsLMtE7wu15DoMJ6VtoUtHinREZCvbWHar \
                  -p /ip4/65.109.51.37/udp/3001/quic-v1/p2p/12D3KooWJRGau8M1rjT7R5e4YYsgdFhsMX35nRDtMwCDjxQkXAHz \
                  -p /ip4/65.109.51.37/udp/3002/quic-v1/p2p/12D3KooWQXJavMDTRscjauFSgVAB1VLB6Rzpy2uY5SU9Tk7927tb \
                  -p /ip4/65.109.51.37/udp/3003/quic-v1/p2p/12D3KooWSQc7CcGtvWDPF1yCbBthFnQjprfCVHmfmNDUrSmqQsU1
            
              sed -i "/^  metrics: None$/c\\
                metrics: !Otlp\\
                  endpoint: \"http://otel-opentelemetry-collector.opentelemetry:4317/\"\\
                  host_identifier: \"${HOSTNAME}\"" user_config.yaml

              sed -i '/^[[:space:]]*file:[[:space:]]*$/{
                N
                N
                s|^[[:space:]]*file:[[:space:]]*$\n[[:space:]]*directory: .*$\n[[:space:]]*prefix: .*$|file: null|
              }' user_config.yaml

              exec logos-blockchain-node user_config.yaml

  volumeClaimTemplates:
    - metadata:
        name: nomos-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn-nomos
        resources:
          requests:
            storage: 20Gi